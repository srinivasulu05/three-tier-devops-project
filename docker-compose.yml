version: "3"
services:
  backend:
    image: ECR_BACKEND_REPO:latest
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=YOUR_RDS_ENDPOINT
      - DB_USER=admin
      - DB_PASSWORD=YOUR_PASSWORD
      - DB_NAME=threetierdb

  frontend:
    image: ECR_FRONTEND_REPO:latest
    ports:
      - "80:80"
    depends_on:
      - backend
