name: Artifact, Outputs and Resuable workflows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - name: Generate version
        id: set-version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Show version
        run: echo "Building version ${{ steps.set-version.outputs.version }}"

      - name: Create build file
        run: echo "This is my app v1.0.${{ github.run_number }}" > app.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.txt

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Show artifact contents
        run: cat app.txt

      - name: Show version from build job
        run: echo "Deploying version ${{ needs.build.outputs.version }}"
